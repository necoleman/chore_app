name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:  # allows manual trigger from the Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time; cancel in-progress if a new push comes in.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        env:
          VITE_BASE_PATH: /chore_app/
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_FCM_API_KEY: ${{ secrets.VITE_FCM_API_KEY }}
          VITE_FCM_AUTH_DOMAIN: ${{ secrets.VITE_FCM_AUTH_DOMAIN }}
          VITE_FCM_PROJECT_ID: ${{ secrets.VITE_FCM_PROJECT_ID }}
          VITE_FCM_STORAGE_BUCKET: ${{ secrets.VITE_FCM_STORAGE_BUCKET }}
          VITE_FCM_MESSAGING_SENDER_ID: ${{ secrets.VITE_FCM_MESSAGING_SENDER_ID }}
          VITE_FCM_APP_ID: ${{ secrets.VITE_FCM_APP_ID }}
          VITE_FCM_VAPID_KEY: ${{ secrets.VITE_FCM_VAPID_KEY }}
        run: npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
